name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Show project structure
        run: |
          echo "Repo root:"
          ls -la
          echo "CarRentalSysV2:"
          ls -la CarRentalSysV2 || true
          echo "Java files found:"
          find CarRentalSysV2 -name "*.java" -print || true

      - name: Compile all Java files
        run: |
          mkdir -p out
          find CarRentalSysV2 -name "*.java" > sources.txt
          if [ ! -s sources.txt ]; then
            echo "No Java files found inside CarRentalSysV2"
            exit 1
          fi
          javac -d out @sources.txt
